<section class="hero" id="home">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- INTRO OVERLAY -->
  <div class="intro-overlay" *ngIf="showIntro" [class.fade-out]="phase === 'reveal'">
    <div class="intro-robot" [class.powered]="phase === 'powerOn' || phase === 'reveal' || phase === 'idle'">
      <div class="robot-body">
        <div class="r-head">
          <div class="r-crest"></div>
          <div class="r-helmet">
            <div class="r-visor"></div>
            <div class="r-ear left"></div>
            <div class="r-ear right"></div>
            <div class="r-cheek left"></div>
            <div class="r-cheek right"></div>
            <div class="r-chin"></div>
            <div class="r-grill"></div>
          </div>
        </div>
        <div class="r-neck">
          <div class="r-neck-ring"></div>
        </div>
        <div class="r-torso">
          <div class="r-upper-plate"></div>
          <div class="r-arc-reactor">
            <div class="r-arc-core"></div>
            <div class="r-arc-ring"></div>
          </div>
          <div class="r-waist"></div>
          <div class="r-shoulder left"></div>
          <div class="r-shoulder right"></div>
          <div class="r-arm left">
            <div class="r-arm-upper"></div>
            <div class="r-arm-joint"></div>
          </div>
          <div class="r-arm right">
            <div class="r-arm-upper"></div>
            <div class="r-arm-joint"></div>
          </div>
        </div>
      </div>
      <div class="intro-glow-overlay"></div>
    </div>
    <div class="scan-line" [class.active]="phase === 'powerOn'"></div>
    <div class="power-flash" [class.active]="phase === 'powerOn'"></div>
    <div class="intro-text" [class.show]="phase === 'powerOn'">INITIALIZING...</div>
  </div>

  <!-- HERO LAYOUT (after intro) -->
  <div class="hero-layout" [class.visible]="phase === 'reveal' || phase === 'idle'">
    <!-- Left Column: Content -->
    <div class="hero-content-col">
      <div class="hero-content">
        <div class="profile-wrapper">
          <div class="profile-glow"></div>
          <img src="/images/ProfilePicture.png" alt="Ahmed Emara" class="profile-img" />
        </div>
        <h1 class="hero-name">
          Hi, I'm <span class="gradient-text">Ahmed Emara</span>
        </h1>
        <div class="typing-wrapper">
          <span class="typing-text">{{ currentTitle }}</span>
          <span class="cursor">|</span>
        </div>
        <p class="hero-tagline">
          Building scalable software solutions with modern technologies.
        </p>
        <div class="hero-actions">
          <button class="btn btn-primary" (click)="scrollToAbout()">
            About Me
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          </button>
          <button class="btn btn-outline" (click)="scrollToProjects()">
            View Projects
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Column: Robot -->
    <div class="hero-robot-col">
      <div class="robot-idle-wrapper" id="robotHeadIdle">
        <div class="robot-body">
          <div class="r-head">
            <div class="r-crest"></div>
            <div class="r-helmet">
              <div class="r-visor"></div>
              <div class="r-ear left"></div>
              <div class="r-ear right"></div>
              <div class="r-cheek left"></div>
              <div class="r-cheek right"></div>
              <div class="r-chin"></div>
              <div class="r-grill"></div>
            </div>
          </div>
          <div class="r-neck">
            <div class="r-neck-ring"></div>
          </div>
          <div class="r-torso">
            <div class="r-upper-plate"></div>
            <div class="r-arc-reactor">
              <div class="r-arc-core"></div>
              <div class="r-arc-ring"></div>
            </div>
            <div class="r-waist"></div>
            <div class="r-shoulder left"></div>
            <div class="r-shoulder right"></div>
            <div class="r-arm left">
              <div class="r-arm-upper"></div>
              <div class="r-arm-joint"></div>
            </div>
            <div class="r-arm right">
              <div class="r-arm-upper"></div>
              <div class="r-arm-joint"></div>
            </div>
          </div>
        </div>
        <div class="robot-idle-glow"></div>
      </div>
    </div>
  </div>

  <div class="scroll-indicator" *ngIf="phase === 'idle'">
    <div class="mouse">
      <div class="wheel"></div>
    </div>
  </div>
</section>
