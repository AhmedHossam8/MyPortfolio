<section class="projects" id="projects">
  <div class="container">
    <h2 class="section-title" appScrollAnimate>Featured Projects</h2>
    <p class="section-subtitle" appScrollAnimate>
      A selection of projects that showcase my skills and passion for building software.
    </p>

    <div class="projects-grid">
      <div
        class="project-card glass"
        *ngFor="let project of projects; trackBy: trackByFn"
        appScrollAnimate
        (mousemove)="onMouseMove($event, $any($event.currentTarget))"
        (mouseleave)="onMouseLeave($any($event.currentTarget))"
      >
        <div class="project-image-wrapper">
          <img [src]="project.image" [alt]="project.title" class="project-image" loading="lazy" />
          <div class="project-overlay">
            <div class="overlay-links">
              <a *ngIf="project.githubLink" [href]="project.githubLink" target="_blank" rel="noopener" class="overlay-btn">
                <i class="fab fa-github"></i> Code
              </a>
              <a *ngIf="project.demoLink" [href]="project.demoLink" target="_blank" rel="noopener" class="overlay-btn">
                <i class="fas fa-external-link-alt"></i> Live
              </a>
            </div>
          </div>
        </div>
        <div class="project-content">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <div class="project-tech">
            <span class="tech-tag" *ngFor="let tech of project.tech">{{ tech }}</span>
          </div>
          <div class="project-links">
            <a *ngIf="project.githubLink" [href]="project.githubLink" target="_blank" rel="noopener">
              <i class="fab fa-github"></i> GitHub
            </a>
            <a *ngIf="project.demoLink" [href]="project.demoLink" target="_blank" rel="noopener">
              <i class="fas fa-external-link-alt"></i> Live Demo
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
