<section class="skills" id="skills">
  <div class="container">
    <h2 class="section-title" appScrollAnimate>Skills & Expertise</h2>
    <p class="section-subtitle" appScrollAnimate>
      Technologies and tools I've worked with throughout my academic and professional journey.
    </p>

    <div class="skills-grid">
      <div
        class="skill-category glass"
        *ngFor="let category of skillCategories; let i = index"
        [style.transition-delay]="i * 0.1 + 's'"
        appScrollAnimate
      >
        <div class="category-header">
          <i class="fas {{ category.icon }}"></i>
          <h3>{{ category.name }}</h3>
        </div>
        <div class="skill-items">
          <div class="skill-item" *ngFor="let skill of category.skills">
            <div class="skill-info">
              <span class="skill-name">{{ skill.name }}</span>
              <span class="skill-level">{{ skill.level }}%</span>
            </div>
            <div class="progress-track">
              <div
                class="progress-fill"
                [style.width.%]="skill.level"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
