<header class="header" [class.scrolled]="isScrolled">
  <div class="header-inner">
    <div class="logo" (click)="scrollTo('home')">
      <span class="logo-text gradient-text">Ahmed Emara</span>
      <span class="logo-title">Junior Software Engineer</span>
    </div>
    <nav class="nav">
      <ul class="nav-list" [class.active]="isMenuActive">
        <li *ngFor="let item of navItems">
          <a
            (click)="scrollTo(item.id)"
            [class.active]="activeSection === item.id"
          >{{ item.label }}</a>
        </li>
      </ul>
      <button
        class="mobile-toggle"
        [class.active]="isMenuActive"
        (click)="toggleMenu()"
        aria-label="Toggle menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </div>
</header>
